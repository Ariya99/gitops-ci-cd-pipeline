replicaCount: 1

image:
  repository: ghcr.io/ariya99/gitops-ci-cd-pipeline
  tag: "b835168fb2932a227109737c8ef9c6d808d1127d"
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app-dev.example.com
      paths:
        - path: /
          pathType: Prefix

rollout:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  - name: ENVIRONMENT
    value: dev
