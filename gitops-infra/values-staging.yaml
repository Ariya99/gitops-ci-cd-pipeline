replicaCount: 2

image:
  repository: ghcr.io/ariya99/gitops-ci-cd-pipeline
  tag: "b835168fb2932a227109737c8ef9c6d808d1127d"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app-staging.example.com
      paths:
        - path: /
          pathType: Prefix

rollout:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  - name: ENVIRONMENT
    value: staging
